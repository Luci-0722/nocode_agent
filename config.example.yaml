# 把这份文件复制到 `<project>/.nocode/config.yaml` 或 `~/.nocode/config.yaml`

# ── 模型配置 ─────────────────────────────────────────────────────
# 支持配置多个模型，通过 /models 命令切换
models:
  glm:
    model: glm-5.1
    base_url: "https://open.bigmodel.cn/api/coding/paas/v4"
    # api_key 省略则从 ZHIPU_API_KEY 环境变量读取
  qwen:
    model: qwen3-coder-plus
    base_url: "https://dashscope.aliyuncs.com/compatible-mode/v1"
    # api_key 省略则从 DASHSCOPE_API_KEY 环境变量读取
  claude:
    model: claude-sonnet-4
    base_url: "https://api.anthropic.com"
    # api_key 省略则从 ANTHROPIC_API_KEY 环境变量读取
  ollama:
    model: qwen2.5-coder:14b
    base_url: "http://127.0.0.1:11434/v1"

# 默认使用的模型（对应 models 中的 key）
default_model: glm

## 阿里百炼（OpenAI 兼容模式）
# model: qwen3-coder-plus
# base_url: "https://dashscope.aliyuncs.com/compatible-mode/v1"
# 推荐使用环境变量，避免把密钥写入文件：
# export DASHSCOPE_API_KEY="YOUR_DASHSCOPE_API_KEY"

## 阿里百炼 Coding Plan（专用 key 通常以 sk-sp- 开头）
# 当前运行时已同时支持 OpenAI 兼容和 Anthropic 风格协议。
# 如使用 glm/qwen 等 OpenAI 兼容模型，优先使用这个地址。
# 注意：base_url 只填基地址，不要填成 `/chat/completions` 这种完整接口路径。
# model: glm-5
# base_url: "https://coding.dashscope.aliyuncs.com/v1"
# api_key: "YOUR_SK_SP_API_KEY"

## 阿里百炼 Claude Code 代理（Anthropic 风格 URL）
# 如使用 Anthropic 风格接口，可配置这个地址。
# model: claude-sonnet-4-5
# base_url: "https://coding.dashscope.aliyuncs.com/apps/anthropic"
# 推荐使用环境变量，避免把密钥写入文件：
# export ANTHROPIC_API_KEY="YOUR_SK_SP_API_KEY"

## Ollama 本地配置
# model: qwen2.5-coder:14b
# base_url: "http://127.0.0.1:11434/v1"

# HTTP/HTTPS 代理，留空或不设置则不使用代理
# 支持 http:// 和 socks5:// 协议
# proxy: "http://127.0.0.1:7890"
# proxy: "socks5://127.0.0.1:1080"
#
# 如需配置不走代理的域名/主机，可使用 no_proxy：
# no_proxy:
#   - localhost
#   - 127.0.0.1
#   - .internal.company.com
#
# 也支持对象写法：
# proxy:
#   url: "http://127.0.0.1:7890"
#   no_proxy:
#     - localhost
#     - 127.0.0.1
#
# 使用代理时如遇到 SSL 证书验证失败（公司代理、中间人代理等），
# 可设置 ssl_verify: false 跳过验证。也可通过环境变量 NOCODE_SSL_VERIFY=false 设置。
# ssl_verify: false

# 模型请求超时（秒）。默认 90 秒，避免长时间卡住无反馈。
request_timeout: 90

# 日志级别。默认 INFO；如需更多细节可改为 DEBUG。
log_level: INFO

max_tokens: 4096
temperature: 0.7
subagent_model: glm-5.1
# subagent_model: qwen2.5-coder:14b
subagent_temperature: 0.7
# checkpoint / ACP sessions / session memory 默认写入
# ~/.nocode/projects/<project-hash>/ 下的固定状态目录。
# 如需覆盖，可显式设置绝对路径，或使用 NOCODE_STATE_DIR。

compression:
  # ── Layer 1: 微压缩 ─────────────────────────────
  trigger_token_percent: 0.60
  trigger_tool_percent: 0.60
  keep_recent_tools: 5
  compressible_tools:
    - read
    - bash
    - glob
    - list_dir
    - grep
    - write
    - edit
    - web_search
    - web_fetch
    - ask_user_question
    - delegate_code

skills:
  enabled: true
  shell_timeout: 10
  listing_budget_percent: 0.01
  listing_max_desc_chars: 250
  restore_max_per_skill: 5000
  restore_total_budget: 25000

auto_compact:
  # ── Layer 3: LLM 总结压缩 ──────────────────────
  enabled: true
  trigger_percent: 0.80
  reserved_output_tokens: 4096
  buffer_tokens: 13000
  max_summary_tokens: 16000
  max_consecutive_failures: 3
  max_files_to_restore: 5
  max_tokens_per_file: 20000
  total_file_budget: 200000

session_memory:
  # ── Layer 2: 会话记忆 ──────────────────────────
  enabled: true
  min_tokens_to_init: 10000
  min_tokens_between_updates: 5000
  min_tool_calls_between_updates: 3
  max_total_tokens: 12000

workspace:
  # ── 工作区额外目录 ─────────────────────────────
  # 当前 shell 的 cwd 永远是默认工作区根。
  # 如需允许访问 cwd 之外的目录，可在这里追加绝对路径：
  # additional_directories:
  #   - /abs/path/to/shared-data
  #   - /abs/path/to/another-repo
  #
  # 运行时会同时读取：
  # - ~/.nocode/config.yaml
  # - <project>/.nocode/config.yaml
  # 项目配置覆盖全局；同名字段会合并为最终运行配置。
  #
  # 当 TUI 审批通过额外目录访问时，也会把目录写回当前项目的
  # .nocode/config.yaml -> workspace.additional_directories。

permissions:
  # ── Human-in-the-loop 工具审批 ─────────────────
  enabled: true
  description_prefix: "以下工具调用需要用户审批"
  interrupt_on:
    write:
      allowed_decisions: [approve, reject]
    edit:
      allowed_decisions: [approve, reject]
    bash:
      allowed_decisions: [approve, reject]
    web_fetch:
      allowed_decisions: [approve, reject]
    web_search:
      allowed_decisions: [approve, reject]
    delegate_code:
      allowed_decisions: [approve, reject]

security:
  # ── 安全防护 ───────────────────────────────────
  # deny_paths: 禁止访问的敏感目录列表
  # 这些路径即使在工作区内也无法被 read/write/edit 访问，
  # 并会从 glob/list_dir/grep 结果中过滤掉
  # 默认已包含: ~/.ssh, ~/.gnupg, ~/.aws, ~/.netrc, ~/.config/gh, ~/.docker
  # 可追加自定义敏感路径：
  # deny_paths:
  #   - ~/private-keys
  #   - /etc/shadow

  # sandbox: 系统级沙箱隔离（实验性功能）
  # 启用后，bash 命令在沙箱内执行，限制文件系统和网络访问
  # macOS 使用 sandbox-exec (Seatbelt)，Linux 使用 bwrap (bubblewrap)
  # sandbox:
  #   enabled: false
  #   allow_read:
  #     - /usr
  #     - /lib
  #   allow_write:
  #     - .  # 工作区
  #   allow_network:
  #     - api.anthropic.com
  #     - pypi.org
